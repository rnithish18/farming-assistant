<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weather - Farming Assistant</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#f0f7f0;color:#1a3d1a}
  header{background:#2d5e2d;color:white;padding:15px 20px;display:flex;align-items:center;justify-content:space-between}
  .header-left{display:flex;align-items:center;gap:15px}
  header a{color:white;text-decoration:none;font-size:1.5rem}
  header h1{font-size:1.3rem}
  .lang-toggle{display:flex;background:rgba(255,255,255,0.15);border-radius:20px;overflow:hidden}
  .lang-btn{padding:6px 14px;border:none;background:transparent;color:white;cursor:pointer;font-size:13px;font-weight:600}
  .lang-btn.active{background:white;color:#2d5e2d;border-radius:20px}
  .container{max-width:500px;margin:20px auto;padding:0 20px}
  .search-box{display:flex;gap:10px}
  input{flex:1;padding:12px;border:2px solid #2d5e2d;border-radius:8px;font-size:1rem;font-family:inherit;outline:none}
  .search-btn{padding:12px 20px;background:#2d5e2d;color:white;border:none;border-radius:8px;font-size:1rem;cursor:pointer}
  .search-btn:disabled{background:#999}
  .mic-btn{width:46px;height:46px;background:#2d5e2d;color:white;border:none;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .mic-btn.listening{background:#c0392b;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  .weather-card{background:white;border-radius:12px;padding:25px;margin-top:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1);display:none}
  .city-name{font-size:1.5rem;font-weight:bold;margin-bottom:5px}
  .description{color:#555;font-size:1rem;margin-bottom:20px;text-transform:capitalize}
  .temp-main{font-size:3rem;font-weight:bold;color:#2d5e2d;margin-bottom:5px}
  .feels-like{color:#555;margin-bottom:20px}
  .details{display:grid;grid-template-columns:1fr 1fr;gap:15px;border-top:1px solid #eee;padding-top:20px}
  .detail-item{text-align:center}
  .detail-label{font-size:0.85rem;color:#777;margin-bottom:4px}
  .detail-value{font-size:1.1rem;font-weight:bold;color:#1a3d1a}
  .loading{text-align:center;margin-top:20px;color:#555;display:none}
  .error-box{background:#fff0f0;border:1px solid #ffcccc;border-radius:8px;padding:15px;margin-top:20px;color:#cc0000;display:none}
  .farming-tip{background:#f0f7f0;border-left:4px solid #2d5e2d;padding:12px 15px;margin-top:20px;border-radius:0 8px 8px 0;font-size:0.95rem;display:flex;align-items:flex-start;gap:10px}
  .speak-btn{background:#e8f5e9;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:16px;flex-shrink:0;margin-left:auto;display:flex;align-items:center;justify-content:center}
  .speak-btn:hover{background:#c8e6c9}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="/static/index.html">←</a>
    <h1 id="h-title">☀️ Weather</h1>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-ta" onclick="setLang('ta')">தமிழ்</button>
  </div>
</header>

<div class="container">
  <div class="search-box">
    <input type="text" id="cityInput" placeholder="Enter city name e.g. Karur"
      onkeypress="if(event.key==='Enter') getWeather()"/>
    <button class="mic-btn" id="micBtn" onclick="startMic()" title="Speak city name">🎤</button>
    <button class="search-btn" id="searchBtn" onclick="getWeather()">Search</button>
  </div>

  <div class="loading" id="loading">Fetching weather...</div>
  <div class="error-box" id="errorBox"></div>

  <div class="weather-card" id="weatherCard">
    <div class="city-name" id="cityName"></div>
    <div class="description" id="description"></div>
    <div class="temp-main" id="temperature"></div>
    <div class="feels-like" id="feelsLike"></div>
    <div class="details">
      <div class="detail-item">
        <div class="detail-label" id="lbl-humidity">💧 Humidity</div>
        <div class="detail-value" id="humidity"></div>
      </div>
      <div class="detail-item">
        <div class="detail-label" id="lbl-wind">💨 Wind Speed</div>
        <div class="detail-value" id="windSpeed"></div>
      </div>
    </div>
  </div>

  <div class="farming-tip" id="farmingTip" style="display:none">
    <span id="tip-text"></span>
    <button class="speak-btn" id="speak-btn" onclick="speakTip()" title="Read aloud">🔊</button>
  </div>
</div>

<script>
let currentLang = 'en';
let currentTip = '';

const T = {
  en: {
    title: '☀️ Weather',
    placeholder: 'Enter city name e.g. Karur',
    searchBtn: 'Search',
    loading: 'Fetching weather...',
    humidity: '💧 Humidity',
    wind: '💨 Wind Speed',
    feelsLike: 'Feels like',
    tipPrefix: '🌾 Farming Tip: ',
    errorNotFound: city => `Could not find weather for "${city}". Please enter city name in English.`,
    errorServer: 'Error: could not reach the server.',
    micListen: 'Listening...',
    micHint: 'Say city name in English'
  },
  ta: {
    title: '☀️ வானிலை',
    placeholder: 'நகர பெயரை ஆங்கிலத்தில் உள்ளிடவும் e.g. Karur',
    searchBtn: 'தேடு',
    loading: 'வானிலை தகவல் பெறுகிறோம்...',
    humidity: '💧 ஈரப்பதம்',
    wind: '💨 காற்று வேகம்',
    feelsLike: 'உணர்வு வெப்பநிலை',
    tipPrefix: '🌾 விவசாய குறிப்பு: ',
    errorNotFound: city => `"${city}" கண்டுபிடிக்கவில்லை. நகர பெயரை ஆங்கிலத்தில் உள்ளிடவும் (e.g. Karur, Chennai).`,
    errorServer: 'பிழை: சேவையகத்தை அணுக முடியவில்லை.',
    micListen: 'கேட்கிறோம்...',
    micHint: 'நகர பெயரை ஆங்கிலத்தில் சொல்லவும்'
  }
};

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-ta').classList.toggle('active', lang === 'ta');
  const t = T[lang];
  document.getElementById('h-title').textContent = t.title;
  document.getElementById('cityInput').placeholder = t.placeholder;
  document.getElementById('searchBtn').textContent = t.searchBtn;
  document.getElementById('loading').textContent = t.loading;
  document.getElementById('lbl-humidity').textContent = t.humidity;
  document.getElementById('lbl-wind').textContent = t.wind;
}

function startMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('Voice input not supported in this browser. Please use Chrome.');
    return;
  }
  const recognition = new SpeechRecognition();
  // Always use English for city name — OpenWeatherMap needs English
  recognition.lang = 'en-IN';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  const micBtn = document.getElementById('micBtn');
  const input = document.getElementById('cityInput');

  micBtn.classList.add('listening');
  micBtn.textContent = '⏹️';
  input.placeholder = T[currentLang].micListen;

  recognition.start();

  recognition.onresult = (event) => {
    const city = event.results[0][0].transcript.trim();
    input.value = city;
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    input.placeholder = T[currentLang].placeholder;
    // Auto search after voice input
    getWeather();
  };

  recognition.onerror = () => {
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    input.placeholder = T[currentLang].placeholder;
  };

  recognition.onend = () => {
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    input.placeholder = T[currentLang].placeholder;
  };
}

async function getWeather() {
  const city = document.getElementById('cityInput').value.trim();
  const btn = document.getElementById('searchBtn');
  const loading = document.getElementById('loading');
  const errorBox = document.getElementById('errorBox');
  const weatherCard = document.getElementById('weatherCard');
  const farmingTip = document.getElementById('farmingTip');

  if (!city) return;

  btn.disabled = true;
  loading.style.display = 'block';
  errorBox.style.display = 'none';
  weatherCard.style.display = 'none';
  farmingTip.style.display = 'none';

  try {
    const res = await fetch(`/weather?city=${encodeURIComponent(city)}&lang=${currentLang}`);
    const data = await res.json();
    const t = T[currentLang];

    if (data.error) {
      errorBox.textContent = t.errorNotFound(city);
      errorBox.style.display = 'block';
    } else {
      document.getElementById('cityName').textContent = '📍 ' + data.city;
      document.getElementById('description').textContent = data.description;
      document.getElementById('temperature').textContent = data.temperature + '°C';
      document.getElementById('feelsLike').textContent = t.feelsLike + ' ' + data.feels_like + '°C';
      document.getElementById('humidity').textContent = data.humidity + '%';
      document.getElementById('windSpeed').textContent = data.wind_speed + ' m/s';
      weatherCard.style.display = 'block';

      currentTip = data.farming_tip || '';
      document.getElementById('tip-text').textContent = t.tipPrefix + currentTip;
      farmingTip.style.display = 'flex';
    }
  } catch(e) {
    const t = T[currentLang];
    errorBox.textContent = t.errorServer;
    errorBox.style.display = 'block';
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

function speakTip() {
  if (!currentTip) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(currentTip);
  utter.lang = currentLang === 'ta' ? 'ta-IN' : 'en-IN';
  utter.rate = 0.9;
  window.speechSynthesis.speak(utter);
  const btn = document.getElementById('speak-btn');
  btn.textContent = '⏹️';
  utter.onend = () => { btn.textContent = '🔊'; };
}
</script>
</body>
</html>

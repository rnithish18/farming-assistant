<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather - Farming Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f7f0;
            color: #1a3d1a;
        }

        header {
            background-color: #2d5e2d;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header a {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
        }

        header h1 {
            font-size: 1.3rem;
        }

        .container {
            max-width: 500px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #2d5e2d;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
        }

        button {
            padding: 12px 20px;
            background-color: #2d5e2d;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }

        button:disabled {
            background-color: #999;
        }

        .weather-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: none;
        }

        .city-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .description {
            color: #555;
            font-size: 1rem;
            margin-bottom: 20px;
            text-transform: capitalize;
        }

        .temp-main {
            font-size: 3rem;
            font-weight: bold;
            color: #2d5e2d;
            margin-bottom: 5px;
        }

        .feels-like {
            color: #555;
            margin-bottom: 20px;
        }

        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #1a3d1a;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
            color: #555;
            display: none;
        }

        .error-box {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            color: #cc0000;
            display: none;
        }

        .farming-tip {
            background: #f0f7f0;
            border-left: 4px solid #2d5e2d;
            padding: 12px 15px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <a href="/static/index.html">←</a>
        <h1>☀️ Weather</h1>
    </header>

    <div class="container">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name e.g. Karur"
                onkeypress="if(event.key==='Enter') getWeather()">
            <button id="searchBtn" onclick="getWeather()">Search</button>
        </div>

        <div class="loading" id="loading">Fetching weather...</div>
        <div class="error-box" id="errorBox"></div>

        <div class="weather-card" id="weatherCard">
            <div class="city-name" id="cityName"></div>
            <div class="description" id="description"></div>
            <div class="temp-main" id="temperature"></div>
            <div class="feels-like" id="feelsLike"></div>
            <div class="details">
                <div class="detail-item">
                    <div class="detail-label">💧 Humidity</div>
                    <div class="detail-value" id="humidity"></div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">💨 Wind Speed</div>
                    <div class="detail-value" id="windSpeed"></div>
                </div>
            </div>
        </div>

        <div class="farming-tip" id="farmingTip"></div>
    </div>

    <script>
        async function getWeather() {
            const city = document.getElementById('cityInput').value.trim();
            const btn = document.getElementById('searchBtn');
            const loading = document.getElementById('loading');
            const errorBox = document.getElementById('errorBox');
            const weatherCard = document.getElementById('weatherCard');
            const farmingTip = document.getElementById('farmingTip');

            if (!city) {
                alert('Please enter a city name.');
                return;
            }

            btn.disabled = true;
            loading.style.display = 'block';
            errorBox.style.display = 'none';
            weatherCard.style.display = 'none';
            farmingTip.style.display = 'none';

            try {
                const response = await fetch(`/weather?city=${encodeURIComponent(city)}`);
                const data = await response.json();

                if (data.error) {
                    errorBox.textContent = `Could not find weather for "${city}". Check the city name and try again.`;
                    errorBox.style.display = 'block';
                } else {
                    document.getElementById('cityName').textContent = `📍 ${data.city}`;
                    document.getElementById('description').textContent = data.description;
                    document.getElementById('temperature').textContent = `${data.temperature}°C`;
                    document.getElementById('feelsLike').textContent = `Feels like ${data.feels_like}°C`;
                    document.getElementById('humidity').textContent = `${data.humidity}%`;
                    document.getElementById('windSpeed').textContent = `${data.wind_speed} m/s`;

                    weatherCard.style.display = 'block';

                    // Show a farming tip based on weather
                    const tip = getFarmingTip(data.temperature, data.humidity, data.description);
                    farmingTip.textContent = `🌾 Farming Tip: ${tip}`;
                    farmingTip.style.display = 'block';
                }
            } catch (error) {
                errorBox.textContent = 'Error: could not reach the server.';
                errorBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function getFarmingTip(temp, humidity, description) {
            if (description.includes('rain')) {
                return 'Rain expected — delay any pesticide or fertilizer application today.';
            } else if (temp > 38) {
                return 'Very hot today — water your crops early morning or evening to reduce evaporation.';
            } else if (temp > 32) {
                return 'Hot weather — ensure your crops have enough water and check for heat stress signs.';
            } else if (humidity > 80) {
                return 'High humidity — watch for fungal diseases. Ensure good air circulation around plants.';
            } else if (humidity < 30) {
                return 'Low humidity — crops may need extra watering. Check soil moisture regularly.';
            } else {
                return 'Good conditions for farming. A great day to inspect your crops and do field work.';
            }
        }
    </script>
</body>
</html>

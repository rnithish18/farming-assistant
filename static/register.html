<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Registration - Farming Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif; background-color: #f4f9f4;
            color: #1a3d1a; display: flex; flex-direction: column;
            min-height: 100vh; justify-content: center; align-items: center;
            padding: 20px;
        }
        .registration-container {
            background: white; width: 100%; max-width: 450px;
            padding: 30px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 5px solid #2d5e2d;
        }
        h2 { color: #2d5e2d; margin-bottom: 20px; font-size: 1.3rem; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; font-size: 0.95rem; }
        input, select {
            width: 100%; padding: 11px; border: 1.5px solid #ccc;
            border-radius: 8px; font-size: 0.95rem; margin-bottom: 15px;
            font-family: inherit;
        }
        input:focus, select:focus { border-color: #2d5e2d; outline: none; }
        .row { display: flex; gap: 12px; }
        .row > div { flex: 1; }
        button {
            width: 100%; background: #2d5e2d; color: white;
            border: none; padding: 13px; font-weight: bold;
            border-radius: 8px; cursor: pointer; font-size: 1rem;
            margin-top: 5px;
        }
        button:hover { background: #1b5e20; }
        button:disabled { background: #999; }
        .otp-box {
            background: #fff8e1; padding: 15px; border-radius: 8px;
            border-left: 4px solid #f59e0b; margin-top: 10px; display: none;
        }
        .otp-box p { color: #92400e; font-size: 0.9rem; margin-bottom: 12px; }
        #status-msg {
            margin-top: 15px; font-weight: bold;
            font-size: 0.9rem; text-align: center; min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="registration-container">
        <h2>🌾 Farmer Registration</h2>

        <div id="profile-step">
            <label>Your Name:</label>
            <input type="text" id="reg-name" placeholder="Enter your full name">

            <div class="row">
                <div>
                    <label>Age:</label>
                    <input type="number" id="reg-age" placeholder="e.g. 35" min="10" max="100">
                </div>
                <div>
                    <label>Gender:</label>
                    <select id="reg-gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <label>Login Method:</label>
            <select id="auth-type" onchange="toggleAuth()">
                <option value="guest">Guest (No OTP needed)</option>
                <option value="email">Email OTP (Recommended)</option>
            </select>

            <div id="email-wrapper" style="display:none;">
                <label>Email Address:</label>
                <input type="email" id="reg-email" placeholder="Enter your email">
            </div>

            <button onclick="submitProfile()">Continue</button>
        </div>

        <div class="otp-box" id="otp-step">
            <p>✅ OTP sent to your email! Check your inbox and enter the 6-digit code below.</p>
            <label>Enter OTP:</label>
            <input type="text" id="otp-input" placeholder="Enter 6-digit OTP" maxlength="6">
            <button onclick="verifyOTP()" style="background:#f59e0b;">Verify & Enter App</button>
        </div>

        <p id="status-msg"></p>
    </div>

    <script>
        // If already logged in, go straight to app
        if (localStorage.getItem('farmer_username')) {
            window.location.replace('/static/index.html');
        }

        function toggleAuth() {
            const type = document.getElementById('auth-type').value;
            document.getElementById('email-wrapper').style.display = type === 'email' ? 'block' : 'none';
        }

        async function submitProfile() {
            const name = document.getElementById('reg-name').value.trim();
            const age = document.getElementById('reg-age').value.trim();
            const gender = document.getElementById('reg-gender').value;
            const authType = document.getElementById('auth-type').value;
            const email = document.getElementById('reg-email').value.trim();

            if (!name) { showMsg('Please enter your name.', 'red'); return; }
            if (!age) { showMsg('Please enter your age.', 'red'); return; }
            if (authType === 'email' && !email) { showMsg('Please enter your email.', 'red'); return; }

            if (authType === 'guest') {
                localStorage.setItem('farmer_username', name);
                localStorage.setItem('farmer_age', age);
                localStorage.setItem('farmer_gender', gender);
                showMsg('Welcome, ' + name + '! Redirecting...', 'green');
                setTimeout(() => { window.location.href = '/static/index.html'; }, 1000);
                return;
            }

            showMsg('Sending OTP to ' + email + '...', 'green');

            try {
                const res = await fetch('/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, email: email })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('farmer_username', name);
                    localStorage.setItem('farmer_age', age);
                    localStorage.setItem('farmer_gender', gender);
                    localStorage.setItem('farmer_email', email);
                    document.getElementById('otp-step').style.display = 'block';
                    showMsg('OTP sent! Check your email inbox.', 'green');
                } else {
                    showMsg('Error: ' + data.message, 'red');
                }
            } catch (e) {
                showMsg('Error: Could not reach server.', 'red');
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp-input').value.trim();
            const email = localStorage.getItem('farmer_email');

            if (!otp || otp.length !== 6) { showMsg('Please enter the 6-digit OTP.', 'red'); return; }

            try {
                const res = await fetch('/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, otp: otp })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('farmer_username', data.name);
                    showMsg('Verified! Welcome ' + data.name + '!', 'green');
                    setTimeout(() => { window.location.href = '/static/index.html'; }, 1000);
                } else {
                    showMsg('Error: ' + data.message, 'red');
                }
            } catch (e) {
                showMsg('Error: Could not reach server.', 'red');
            }
        }

        function showMsg(text, color) {
            const msg = document.getElementById('status-msg');
            msg.textContent = text;
            msg.style.color = color === 'red' ? '#d32f2f' : '#2d5e2d';
        }
    </script>
</body>
</html>

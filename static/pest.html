<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pest Alert - Farming Assistant</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#f0f7f0;color:#1a3d1a}
  header{background:#2d5e2d;color:white;padding:15px 20px;display:flex;align-items:center;justify-content:space-between}
  .header-left{display:flex;align-items:center;gap:15px}
  header a{color:white;text-decoration:none;font-size:1.5rem}
  header h1{font-size:1.3rem}
  .lang-toggle{display:flex;background:rgba(255,255,255,0.15);border-radius:20px;overflow:hidden}
  .lang-btn{padding:6px 14px;border:none;background:transparent;color:white;cursor:pointer;font-size:13px;font-weight:600}
  .lang-btn.active{background:white;color:#2d5e2d;border-radius:20px}
  .container{max-width:500px;margin:20px auto;padding:0 20px}
  .input-group{margin-bottom:12px;display:flex;gap:10px}
  .input-group input{flex:1;padding:12px;border:2px solid #2d5e2d;border-radius:8px;font-size:1rem;font-family:inherit;outline:none}
  .mic-btn{width:46px;height:46px;background:#2d5e2d;color:white;border:none;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .mic-btn.listening{background:#c0392b;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  select{width:100%;padding:12px;border:2px solid #2d5e2d;border-radius:8px;font-size:1rem;font-family:inherit;outline:none;background:white;margin-bottom:12px}
  .check-btn{width:100%;padding:13px;background:#2d5e2d;color:white;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}
  .check-btn:disabled{background:#999}
  .result-card{background:white;border-radius:12px;padding:20px;margin-top:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08);display:none}
  .result-card pre{white-space:pre-wrap;font-family:Arial,sans-serif;font-size:0.95rem;line-height:1.7;color:#1a3d1a}
  .result-footer{display:flex;justify-content:flex-end;margin-top:12px}
  .speak-btn{background:#e8f5e9;border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
  .speak-btn:hover{background:#c8e6c9}
  .loading{text-align:center;margin-top:20px;color:#555;display:none}
  .error-box{background:#fff0f0;border:1px solid #ffcccc;border-radius:8px;padding:15px;margin-top:20px;color:#cc0000;display:none}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <a href="/static/index.html">←</a>
    <h1 id="h-title">🐛 Pest Alert</h1>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-ta" onclick="setLang('ta')">தமிழ்</button>
  </div>
</header>

<div class="container">
  <div class="input-group">
    <input type="text" id="cropInput" placeholder="Enter crop name e.g. Paddy"/>
    <button class="mic-btn" id="micBtn" onclick="startMic()" title="Speak crop name">🎤</button>
  </div>

  <select id="stateSelect">
    <option value="Tamil Nadu">Tamil Nadu</option>
    <option value="Andhra Pradesh">Andhra Pradesh</option>
    <option value="Karnataka">Karnataka</option>
    <option value="Maharashtra">Maharashtra</option>
    <option value="Punjab">Punjab</option>
    <option value="Uttar Pradesh">Uttar Pradesh</option>
    <option value="Gujarat">Gujarat</option>
    <option value="Rajasthan">Rajasthan</option>
    <option value="West Bengal">West Bengal</option>
    <option value="Madhya Pradesh">Madhya Pradesh</option>
  </select>

  <select id="seasonSelect">
    <option value="Kharif — Monsoon (June-October)">Kharif — Monsoon (June-October)</option>
    <option value="Rabi — Winter (November-March)">Rabi — Winter (November-March)</option>
    <option value="Zaid — Summer (March-June)">Zaid — Summer (March-June)</option>
  </select>

  <button class="check-btn" id="checkBtn" onclick="getPestAlerts()">Check Pest Alerts</button>
  <div class="loading" id="loading">Fetching pest alerts...</div>
  <div class="error-box" id="errorBox"></div>
  <div class="result-card" id="resultCard">
    <pre id="pestResult"></pre>
    <div class="result-footer">
      <button class="speak-btn" id="speak-btn" onclick="speakResult()" title="Read aloud">🔊</button>
    </div>
  </div>
</div>

<script>
let currentLang = 'en';
let currentResult = '';

const T = {
  en: {
    title: '🐛 Pest Alert',
    placeholder: 'Enter crop name e.g. Paddy',
    checkBtn: 'Check Pest Alerts',
    loading: 'Fetching pest alerts...',
    errorServer: 'Error: could not reach the server.',
    micListen: 'Listening...'
  },
  ta: {
    title: '🐛 பூச்சி எச்சரிக்கை',
    placeholder: 'பயிர் பெயரை ஆங்கிலத்தில் உள்ளிடவும் e.g. Paddy',
    checkBtn: 'பூச்சி எச்சரிக்கை பார்க்க',
    loading: 'பூச்சி எச்சரிக்கை பெறுகிறோம்...',
    errorServer: 'பிழை: சேவையகத்தை அணுக முடியவில்லை.',
    micListen: 'கேட்கிறோம்...'
  }
};

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  document.getElementById('btn-ta').classList.toggle('active', lang==='ta');
  const t = T[lang];
  document.getElementById('h-title').textContent = t.title;
  document.getElementById('cropInput').placeholder = t.placeholder;
  document.getElementById('checkBtn').textContent = t.checkBtn;
  document.getElementById('loading').textContent = t.loading;
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Voice input not supported. Please use Chrome.'); return; }
  const recognition = new SR();
  recognition.lang = 'en-IN';
  recognition.interimResults = false;
  const micBtn = document.getElementById('micBtn');
  const input = document.getElementById('cropInput');
  micBtn.classList.add('listening');
  micBtn.textContent = '⏹️';
  input.placeholder = T[currentLang].micListen;
  recognition.start();
  recognition.onresult = (e) => {
    input.value = e.results[0][0].transcript.trim();
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    input.placeholder = T[currentLang].placeholder;
    getPestAlerts();
  };
  recognition.onerror = recognition.onend = () => {
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    input.placeholder = T[currentLang].placeholder;
  };
}

async function getPestAlerts() {
  const crop = document.getElementById('cropInput').value.trim();
  const state = document.getElementById('stateSelect').value;
  const season = document.getElementById('seasonSelect').value;
  if (!crop) return;
  document.getElementById('checkBtn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('resultCard').style.display = 'none';
  try {
    const res = await fetch(`/pest?crop=${encodeURIComponent(crop)}&state=${encodeURIComponent(state)}&season=${encodeURIComponent(season)}&lang=${currentLang}`);
    const data = await res.json();
    document.getElementById('loading').style.display = 'none';
    if (data.error) {
      document.getElementById('errorBox').textContent = data.error;
      document.getElementById('errorBox').style.display = 'block';
    } else {
      currentResult = data.alerts;
      document.getElementById('pestResult').textContent = currentResult;
      document.getElementById('resultCard').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('errorBox').textContent = T[currentLang].errorServer;
    document.getElementById('errorBox').style.display = 'block';
  } finally {
    document.getElementById('checkBtn').disabled = false;
  }
}

function speakResult() {
  if (!currentResult) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(currentResult);
  utter.lang = currentLang === 'ta' ? 'ta-IN' : 'en-IN';
  utter.rate = 0.9;
  window.speechSynthesis.speak(utter);
  const btn = document.getElementById('speak-btn');
  btn.textContent = '⏹️';
  utter.onend = () => { btn.textContent = '🔊'; };
}

document.getElementById('cropInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') getPestAlerts();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ask a Question - Farming Assistant</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#f0f7f0;color:#1a3d1a}
  header{background:#2d5e2d;color:white;padding:15px 20px;display:flex;align-items:center;justify-content:space-between}
  .header-left{display:flex;align-items:center;gap:15px}
  header a{color:white;text-decoration:none;font-size:1.5rem}
  header h1{font-size:1.3rem}
  .lang-toggle{display:flex;background:rgba(255,255,255,0.15);border-radius:20px;overflow:hidden}
  .lang-btn{padding:6px 14px;border:none;background:transparent;color:white;cursor:pointer;font-size:13px;font-weight:600}
  .lang-btn.active{background:white;color:#2d5e2d;border-radius:20px}
  
  /* Active Session Sub-Navbar style */
  .session-bar { background: #e8f5e9; padding: 10px 20px; text-align: right; font-size: 0.9rem; font-weight: 600; color: #1b441b; border-bottom: 1px solid #d0e2d0; }

  .container{max-width:500px;margin:20px auto;padding:0 20px}
  .input-row{display:flex;gap:10px;align-items:flex-start}
  textarea{flex:1;padding:14px;border:2px solid #2d5e2d;border-radius:8px;font-size:1rem;font-family:inherit;outline:none;min-height:90px;resize:vertical}
  .mic-btn{width:46px;height:46px;background:#2d5e2d;color:white;border:none;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .mic-btn.listening{background:#c0392b;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  .ask-btn{width:100%;padding:13px;background:#2d5e2d;color:white;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:12px}
  .ask-btn:disabled{background:#999}
  .loading{text-align:center;margin-top:20px;color:#555;display:none}
  .error-box{background:#fff0f0;border:1px solid #ffcccc;border-radius:8px;padding:15px;margin-top:20px;color:#cc0000;display:none}
  .result-card{background:white;border-radius:12px;padding:20px;margin-top:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08);display:none}
  .result-card p{font-size:0.95rem;line-height:1.7;color:#1a3d1a;margin-bottom:10px;white-space:pre-wrap}
  .result-footer{display:flex;justify-content:flex-end}
  .speak-btn{background:#e8f5e9;border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
  .speak-btn:hover{background:#c8e6c9}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <a href="/static/index.html">←</a>
    <h1 id="h-title">💬 Ask a Question</h1>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-ta" onclick="setLang('ta')">தமிழ்</button>
  </div>
</header>

<div class="session-bar">
  👤 Farmer Profile: <span id="sessionUser" style="color: #2e7d32;">Checking...</span>
</div>

<div class="container">
  <div class="input-row">
    <textarea id="questionInput" placeholder="Type your farming question here..."></textarea>
    <button class="mic-btn" id="micBtn" onclick="startMic()" title="Speak your question">🎤</button>
  </div>
  <button class="ask-btn" id="askBtn" onclick="askQuestion()">Ask</button>

  <div class="loading" id="loading">Thinking...</div>
  <div class="error-box" id="errorBox"></div>

  <div class="result-card" id="resultCard">
    <p id="answerText"></p>
    <div class="result-footer">
      <button class="speak-btn" id="speak-btn" onclick="speakAnswer()" title="Read aloud">🔊</button>
    </div>
  </div>
</div>

<script>
let currentLang = 'en';
let currentAnswer = '';

// Read session dynamically from dashboard register credentials
const currentFarmer = localStorage.getItem("farmer_username");
if (!currentFarmer) {
    window.location.replace("/static/register.html");
}

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("sessionUser").textContent = currentFarmer;
});

const T = {
  en: {
    title: '💬 Ask a Question',
    placeholder: 'Type your farming question here...',
    askBtn: 'Ask',
    loading: 'Thinking...',
    errorEmpty: 'Please type or speak a question first.',
    errorServer: 'Error: could not reach the server.',
    micListen: 'Listening...'
  },
  ta: {
    title: '💬 கேள்வி கேளுங்கள்',
    placeholder: 'உங்கள் வேளாண் கேள்வியை இங்கே தட்டச்சு செய்யவும்...',
    askBtn: 'கேள்',
    loading: 'சிந்திக்கிறோம்...',
    errorEmpty: 'முதலில் ஒரு கேள்வியை தட்டச்சு செய்யவும் அல்லது பேசவும்.',
    errorServer: 'பிழை: சேவையகத்தை அணுக முடியவில்லை.',
    micListen: 'கேட்கிறோம்...'
  }
};

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  document.getElementById('btn-ta').classList.toggle('active', lang==='ta');
  const t = T[lang];
  document.getElementById('h-title').textContent = t.title;
  document.getElementById('questionInput').placeholder = t.placeholder;
  document.getElementById('askBtn').textContent = t.askBtn;
  document.getElementById('loading').textContent = t.loading;
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Voice input not supported. Please use Chrome.'); return; }
  const recognition = new SR();
  recognition.lang = currentLang === 'ta' ? 'ta-IN' : 'en-IN';
  recognition.interimResults = false;
  const micBtn = document.getElementById('micBtn');
  const input = document.getElementById('questionInput');
  micBtn.classList.add('listening');
  micBtn.textContent = '⏹️';
  input.placeholder = T[currentLang].micListen;
  recognition.start();
  recognition.onresult = (e) => {
    input.value = e.results[0][0].transcript.trim();
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    input.placeholder = T[currentLang].placeholder;
  };
  recognition.onerror = recognition.onend = () => {
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    input.placeholder = T[currentLang].placeholder;
  };
}

function cleanText(text) {
  return text.replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1');
}

async function askQuestion() {
  const question = document.getElementById('questionInput').value.trim();
  const t = T[currentLang];
  const errorBox = document.getElementById('errorBox');
  const resultCard = document.getElementById('resultCard');
  const loading = document.getElementById('loading');
  const askBtn = document.getElementById('askBtn');

  errorBox.style.display = 'none';
  resultCard.style.display = 'none';

  if (!question) {
    errorBox.textContent = t.errorEmpty;
    errorBox.style.display = 'block';
    return;
  }

  askBtn.disabled = true;
  loading.style.display = 'block';

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      // Pass username securely into the request context to write history metrics correctly
      body: JSON.stringify({ username: currentFarmer, message: question, lang: currentLang })
    });
    const data = await res.json();
    loading.style.display = 'none';

    if (data.error) {
      errorBox.textContent = data.error;
      errorBox.style.display = 'block';
    } else {
      currentAnswer = cleanText(data.reply);
      document.getElementById('answerText').textContent = currentAnswer;
      resultCard.style.display = 'block';
    }
  } catch (e) {
    loading.style.display = 'none';
    errorBox.textContent = t.errorServer;
    errorBox.style.display = 'block';
  } finally {
    askBtn.disabled = false;
  }
}

function speakAnswer() {
  if (!currentAnswer) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(currentAnswer);
  utter.lang = currentLang === 'ta' ? 'ta-IN' : 'en-IN';
  utter.rate = 0.9;
  window.speechSynthesis.speak(utter);
  const btn = document.getElementById('speak-btn');
  btn.textContent = '⏹️';
  utter.onend = () => { btn.textContent = '🔊'; };
}

document.getElementById('questionInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    askQuestion();
  }
});
</script>

<div style="text-align:center;padding:14px 10px;font-size:0.8rem;color:#777;background:transparent;margin-top:10px">
  Developed by Nithish | Software Engineering Student
</div>
</body>
</html>
